<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Patient Registry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Hospital Patient Registry</h1>

        <form id="patientForm">
            <input type="text" id="name" placeholder="Patient Name" required>

            <input type="date" id="admissionDate" required>

            <input type="text" id="illness" placeholder="Illness Name" required>

            <button type="submit">Register Patient</button>
        </form>

        <button class="show-btn" onclick="loadPatients()">
            Show Registered Patients
        </button>

        <ul id="patientList"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
